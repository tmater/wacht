name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.user.login == 'tmater' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
