name: Smoke test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  smoke:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.user.login == 'tmater' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run smoke harness
        run: python3 smoke/run.py
