name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    # Run PR CI for the repo owner and Dependabot-authored updates.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.user.login == 'tmater' || github.event.pull_request.user.login == 'dependabot[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
