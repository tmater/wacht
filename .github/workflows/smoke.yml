name: Smoke test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  smoke:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.user.login == 'tmater' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install smoke test dependencies
        run: python3 -m pip install -r smoke/requirements.txt

      - name: Run smoke tests
        run: python3 -m pytest smoke/tests -x -s
