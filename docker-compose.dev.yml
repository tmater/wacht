services:
  server:
    volumes:
      - ./config/server.dev.yaml:/etc/wacht/server.yaml:ro

  probe-1:
    volumes:
      - ./config/probe-1.dev.yaml:/etc/wacht/probe.yaml:ro

  probe-2:
    volumes:
      - ./config/probe-2.dev.yaml:/etc/wacht/probe.yaml:ro

  probe-3:
    volumes:
      - ./config/probe-3.dev.yaml:/etc/wacht/probe.yaml:ro

  mock:
    build:
      context: .
      args:
        BINARY: wacht-mock
    ports:
      - "9090:9090"
    restart: unless-stopped
