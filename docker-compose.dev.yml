services:
  server:
    volumes:
      - ./config/server.dev.yaml:/etc/wacht/server.yaml:ro

  probe-1:
    command: ["--config=/etc/wacht/probe.yaml", "--secret=dev-probe-secret-a7f3c921"]

  probe-2:
    command: ["--config=/etc/wacht/probe.yaml", "--secret=dev-probe-secret-a7f3c921"]

  probe-3:
    command: ["--config=/etc/wacht/probe.yaml", "--secret=dev-probe-secret-a7f3c921"]

  mock:
    build:
      context: .
      args:
        BINARY: wacht-mock
    ports:
      - "9090:9090"
    restart: unless-stopped
