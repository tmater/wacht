name: Publish private test images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Mutable GHCR tag to publish for deployment rehearsal.
        required: true
        default: private-test
      platforms:
        description: Target platform list.
        required: true
        default: linux/amd64

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  publish-go-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        binary: [wacht-server, wacht-probe]

    steps:
      - uses: actions/checkout@v6

      - name: Resolve image tag
        id: vars
        run: echo "sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: ${{ inputs.platforms }}
          build-args: BINARY=${{ matrix.binary }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.binary }}:${{ inputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.binary }}:${{ steps.vars.outputs.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  publish-web-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Resolve image tag
        id: vars
        run: echo "sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./wacht-web
          push: true
          platforms: ${{ inputs.platforms }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/wacht-web:${{ inputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/wacht-web:${{ steps.vars.outputs.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
