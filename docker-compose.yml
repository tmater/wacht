services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: wacht
      POSTGRES_PASSWORD_FILE: /run/secrets/wacht_postgres_password
      POSTGRES_DB: wacht
    secrets:
      - wacht_postgres_password
    volumes:
      - wacht-data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wacht"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      args:
        BINARY: wacht-server
    command: ["--config=/etc/wacht/server.yaml"]
    environment:
      WACHT_DATABASE_DSN_FILE: /run/secrets/wacht_database_dsn
    secrets:
      - wacht_database_dsn
    volumes:
      - ${SERVER_CONFIG_PATH:-./config/server.yaml}:/etc/wacht/server.yaml:ro
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  probe-1:
    build:
      context: .
      args:
        BINARY: wacht-probe
    command: ["--config=/etc/wacht/probe.yaml"]
    volumes:
      - ${PROBE_1_CONFIG_PATH:-./config/probe-1.yaml}:/etc/wacht/probe.yaml:ro
    depends_on:
      - server
    restart: unless-stopped

  probe-2:
    build:
      context: .
      args:
        BINARY: wacht-probe
    command: ["--config=/etc/wacht/probe.yaml"]
    volumes:
      - ${PROBE_2_CONFIG_PATH:-./config/probe-2.yaml}:/etc/wacht/probe.yaml:ro
    depends_on:
      - server
    restart: unless-stopped

  probe-3:
    build:
      context: .
      args:
        BINARY: wacht-probe
    command: ["--config=/etc/wacht/probe.yaml"]
    volumes:
      - ${PROBE_3_CONFIG_PATH:-./config/probe-3.yaml}:/etc/wacht/probe.yaml:ro
    depends_on:
      - server
    restart: unless-stopped

  wacht-web:
    build:
      context: ./wacht-web
    ports:
      - "${WACHT_WEB_PORT:-3000}:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  wacht-data:

secrets:
  wacht_postgres_password:
    file: ${WACHT_POSTGRES_PASSWORD_SECRET_FILE:-./secrets/wacht_postgres_password}
  wacht_database_dsn:
    file: ${WACHT_DATABASE_DSN_SECRET_FILE:-./secrets/wacht_database_dsn}
