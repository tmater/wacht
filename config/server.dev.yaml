# Local dev probes Docker service names like "mock", so private targets must
# be allowed here. Hosted/managed probes should keep this disabled.
allow_private_targets: true
probes:
  - id: probe-1
    secret: changeme-probe-1
  - id: probe-2
    secret: changeme-probe-2
  - id: probe-3
    secret: changeme-probe-3
seed_user:
  email: dev@wacht.local
  password: devpassword
checks:
  - id: check-up
    type: http
    target: http://mock:9090/up
  - id: check-down
    type: http
    target: http://mock:9090/down
  - id: check-flap
    type: http
    target: http://mock:9090/flap
  - id: check-slow
    type: http
    target: http://mock:9090/slow
