services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: wacht
      POSTGRES_PASSWORD: wacht
      POSTGRES_DB: wacht
    volumes:
      - wacht-smoke-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wacht"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      smoke:

  server:
    build:
      context: ../..
      args:
        BINARY: wacht-server
    command: ["--config=/etc/wacht/server.yaml", "--dsn=postgres://wacht:wacht@postgres/wacht?sslmode=disable"]
    volumes:
      - ./server.yaml:/etc/wacht/server.yaml:ro
    ports:
      - "${SMOKE_HTTP_PORT:-18080}:8080"
    depends_on:
      mock:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    dns:
      - 172.29.0.53
    networks:
      smoke:

  probe-1:
    build:
      context: ../..
      args:
        BINARY: wacht-probe
    command: ["--config=/etc/wacht/probe.yaml"]
    volumes:
      - ./probe-1.yaml:/etc/wacht/probe.yaml:ro
    depends_on:
      mock:
        condition: service_healthy
      server:
        condition: service_healthy
    dns:
      - 172.29.0.53
    networks:
      smoke:

  probe-2:
    build:
      context: ../..
      args:
        BINARY: wacht-probe
    command: ["--config=/etc/wacht/probe.yaml"]
    volumes:
      - ./probe-2.yaml:/etc/wacht/probe.yaml:ro
    depends_on:
      mock:
        condition: service_healthy
      server:
        condition: service_healthy
    dns:
      - 172.29.0.53
    networks:
      smoke:

  probe-3:
    build:
      context: ../..
      args:
        BINARY: wacht-probe
    command: ["--config=/etc/wacht/probe.yaml"]
    volumes:
      - ./probe-3.yaml:/etc/wacht/probe.yaml:ro
    depends_on:
      mock:
        condition: service_healthy
      server:
        condition: service_healthy
    dns:
      - 172.29.0.53
    networks:
      smoke:

  mock:
    build:
      context: ../..
      args:
        BINARY: wacht-mock
    ports:
      - "${SMOKE_MOCK_PORT:-19090}:9090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/up || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      smoke:
        ipv4_address: 172.29.0.53

volumes:
  wacht-smoke-data:

networks:
  smoke:
    ipam:
      config:
        - subnet: 172.29.0.0/24
