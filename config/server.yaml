# Self-hosted installs often monitor Docker, VPN, or RFC1918 targets.
# Keep this enabled for private/internal monitoring. Disable it for hosted
# or managed-probe deployments that must not reach internal networks.
allow_private_targets: true
# Reverse-proxy CIDRs trusted to forward client IPs for auth rate limiting.
# Leave unset to trust only loopback proxies. For Docker/nginx or remote
# reverse proxies, set this explicitly to the proxy subnet(s). Set to [] to
# disable forwarded-header trust entirely.
# trusted_proxies:
#   - 172.16.0.0/12
probes:
  - id: probe-1
    secret: changeme-probe-1
  - id: probe-2
    secret: changeme-probe-2
  - id: probe-3
    secret: changeme-probe-3
# First admin account — created on first boot when no users exist yet.
# Change the password immediately after your first login.
seed_user:
  email: admin@wacht.local
  password: changeme
checks:
  - name: check-cloudflare
    type: http
    target: https://cloudflare.com
    webhook: https://hooks.example.com/your-url
  - name: check-google
    type: http
    target: https://google.com
  - name: check-tcp-example
    type: tcp
    target: example.com:443
  - name: check-dns-example
    type: dns
    target: example.com
